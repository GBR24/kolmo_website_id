<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kolmo Platform | Coming Soon</title>
    <meta name="robots" content="noindex, follow" />
    <meta
      name="description"
      content="Kolmo platform access is coming soon. Stay updated with the newsletter."
    />
    <meta name="theme-color" content="#050b11" />
    <link rel="canonical" href="https://kolmolabs.com/platform/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kolmo" />
    <meta property="og:url" content="https://kolmolabs.com/platform/" />
    <meta property="og:title" content="Kolmo Platform | Coming Soon" />
    <meta
      property="og:description"
      content="Kolmo platform access is coming soon. Stay updated with the newsletter."
    />
    <meta property="og:image" content="https://kolmolabs.com/og-image.svg" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kolmo Platform | Coming Soon" />
    <meta
      name="twitter:description"
      content="Kolmo platform access is coming soon. Stay updated with the newsletter."
    />
    <meta name="twitter:image" content="https://kolmolabs.com/og-image.svg" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebPage",
        "url": "https://kolmolabs.com/platform/",
        "name": "Kolmo Platform | Coming Soon",
        "description": "Kolmo platform access is coming soon. Stay updated with the newsletter.",
        "isPartOf": {
          "@type": "WebSite",
          "url": "https://kolmolabs.com/",
          "name": "Kolmo"
        },
        "inLanguage": "en"
      }
    </script>
    <style>
      :root {
        color-scheme: dark;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(123, 164, 187, 0.12), transparent 32%),
          linear-gradient(180deg, #08111a 0%, #050b11 100%);
        color: #edf3f8;
        font-family: "Inter", "Geist", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 760px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 28px;
        padding: 48px 32px;
        background: linear-gradient(180deg, rgba(8, 15, 22, 0.92), rgba(7, 12, 18, 0.97));
        box-shadow: 0 32px 100px rgba(0, 0, 0, 0.34);
        text-align: center;
      }

      .eyebrow {
        font-size: 0.72rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(237, 243, 248, 0.62);
      }

      h1 {
        margin: 20px auto 0;
        max-width: 12ch;
        font-size: clamp(2.6rem, 8vw, 4.6rem);
        line-height: 0.95;
        letter-spacing: -0.05em;
      }

      p {
        margin: 20px auto 0;
        max-width: 34rem;
        font-size: 1.05rem;
        line-height: 1.9;
        color: rgba(237, 243, 248, 0.72);
      }

      .actions {
        margin-top: 32px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 14px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 22px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #edf3f8;
        text-decoration: none;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 0.8rem;
        transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
      }

      .button:hover {
        border-color: rgba(255, 255, 255, 0.18);
        color: #ffffff;
      }

      .button--primary {
        background: rgba(255, 255, 255, 0.06);
      }

      .button--primary:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .button--secondary {
        background: transparent;
        color: rgba(237, 243, 248, 0.76);
      }

      @media (max-width: 640px) {
        main {
          padding: 40px 22px;
          border-radius: 24px;
        }

        p {
          font-size: 0.98rem;
          line-height: 1.75;
        }

        .actions {
          flex-direction: column;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Platform Preview</div>
      <h1>Coming soon.</h1>
      <p>Stay updated with our newsletter while we prepare the full Kolmo platform experience.</p>

      <div class="actions">
        <a class="button button--primary" href="/#newsletter">Join Newsletter</a>
        <a class="button button--secondary" href="/">Back to Home</a>
      </div>
    </main>
  </body>
</html>
